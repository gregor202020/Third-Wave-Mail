version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: twmail-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d
    command: >
      postgres
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=16MB
        -c maintenance_work_mem=128MB
        -c max_connections=50
        -c max_wal_size=1GB
        -c shared_preload_libraries='pg_stat_statements'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - twmail

  pgbouncer:
    image: edoburu/pgbouncer:1.22.0
    container_name: twmail-pgbouncer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 40
      MAX_CLIENT_CONN: 400
      RESERVE_POOL_SIZE: 5
    ports:
      - "6432:6432"
    volumes:
      - ./pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - twmail

  redis:
    image: redis:7-alpine
    container_name: twmail-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - twmail

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: twmail-api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - API_PORT=${API_PORT}
      - API_HOST=${API_HOST}
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN}
      - RATE_LIMIT_DASHBOARD=${RATE_LIMIT_DASHBOARD}
      - RATE_LIMIT_API_KEY=${RATE_LIMIT_API_KEY}
      - RATE_LIMIT_WINDOW_MS=${RATE_LIMIT_WINDOW_MS}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./packages:/app/packages
      - /app/node_modules
      - /app/packages/api/node_modules
      - /app/packages/shared/node_modules
    networks:
      - twmail

  worker-bulk:
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    container_name: twmail-worker-bulk
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_TYPE=bulk
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - twmail

  worker-system:
    build:
      context: .
      dockerfile: packages/workers/Dockerfile
    container_name: twmail-worker-system
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - NODE_ENV=${NODE_ENV}
      - LOG_LEVEL=${LOG_LEVEL}
      - WORKER_TYPE=system
    depends_on:
      postgres:
        condition: service_healthy
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - twmail

  frontend:
    image: node:22-alpine
    container_name: twmail-frontend
    working_dir: /app
    command: echo "Frontend placeholder - will be configured in Plan 6"
    networks:
      - twmail

  nginx:
    image: nginx:alpine
    container_name: twmail-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - twmail

  bull-board:
    image: node:22-alpine
    container_name: twmail-bull-board
    working_dir: /app
    command: echo "Bull Board placeholder - will be configured in Plan 2"
    networks:
      - twmail

volumes:
  pgdata:
  redisdata:
  assets:

networks:
  twmail:
    driver: bridge
